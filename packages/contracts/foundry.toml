[profile.default]
src = 'src'
test = 'test'
script = 'script'
out = 'out'
libs = ['lib']
solc_version = '0.8.27'
optimizer = true
optimizer_runs = 200
via_ir = false
fuzz = { runs = 1000 }
invariant = { runs = 256, depth = 32, fail_on_revert = false }

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = 'long'
