name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Default to least-privilege; bump per-job if a workflow needs more.
permissions:
  contents: read

# Cancel in-progress runs for the same ref when a new push lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r run typecheck
      - run: pnpm -r run test
      - run: pnpm -r run build

  brand-rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Block em dashes in public-facing docs
        run: |
          set -e
          if grep -rn '—' \
            --include='*.md' \
            --exclude=CODE_OF_CONDUCT.md \
            --exclude-dir=node_modules \
            --exclude-dir=.venv \
            --exclude-dir=docs/superpowers \
            .; then
            echo "::error::Em dashes (—) are banned in public-facing docs per brand rule"
            exit 1
          fi
          echo "Brand rule check: no em dashes found."
      - name: Block Web3 / Web2 buzzwords in body content
        run: |
          set -e
          if grep -rniE '\bweb ?[23]\b' \
            --include='*.md' \
            --exclude-dir=node_modules \
            --exclude-dir=.venv \
            --exclude-dir=docs/superpowers \
            .; then
            echo "::error::Web3 / Web2 banned in public-facing docs; use specific terms"
            exit 1
          fi
          echo "Brand rule check: no Web3/Web2 references found."

  contracts:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly
      - name: forge build
        run: forge build --sizes
      - name: forge test
        run: forge test
      - name: forge coverage gate
        run: |
          forge coverage --report summary | tee /tmp/coverage.txt
          echo "Coverage report written; gate threshold enforced via repo policy, not via forge-coverage flag"
      - name: Install slither + mythril
        run: |
          python -m pip install --upgrade pip
          pip install slither-analyzer==0.10.0 mythril==0.24.7
      - name: Slither
        run: slither . --config-file slither.config.json
      - name: Mythril (per-contract, 300s budget each)
        run: |
          for f in src/EscrowVault.sol src/HostageBond.sol src/ServiceMarketplace.sol; do
            echo "::group::myth analyze $f"
            myth analyze "$f" --solv 0.8.27 --execution-timeout 300 || exit 1
            echo "::endgroup::"
          done
