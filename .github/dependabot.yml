version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      vitest:
        patterns: ["vitest", "@vitest/*"]
      typescript:
        patterns: ["typescript", "@types/*"]

  - package-ecosystem: "pip"
    directory: "/packages/crewai-plugin"
    schedule:
      interval: "weekly"

  - package-ecosystem: "cargo"
    directory: "/packages/circuits"
    schedule:
      interval: "monthly"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
